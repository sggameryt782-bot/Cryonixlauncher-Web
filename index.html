<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryonixLauncher</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Reset & Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #050508; /* Deep black background with a tiny hint of blue */
            color: #f0f4f8; /* Light white/blue tint text for readability */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Abstract Blue Glows on Dark Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(32, 115, 239, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(32, 115, 239, 0.08) 0%, transparent 50%);
            z-index: -1;
        }

        /* Header Navigation */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Top Left Logo Area with the WebP Logo */
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .top-left-logo {
            width: 38px;
            height: 38px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: rgba(255, 255, 255, 0.02);
            padding: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-socials {
            display: flex;
            gap: 20px;
        }

        .nav-socials a {
            color: #8da2bb;
            font-size: 1.3rem;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-socials a:hover {
            color: #2073ef;
        }

        /* Main Content Container */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 800px;
        }

        /* Live Status Badge */
        .status-badge {
            background-color: rgba(32, 115, 239, 0.1);
            border: 1px solid rgba(32, 115, 239, 0.25);
            color: #7faff7;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981; 
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        /* Title & Description */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 1.25rem;
            color: #8da2bb;
            font-weight: 400;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* Call To Action Buttons Block */
        .cta-group {
            display: flex;
            gap: 16px;
            width: 100%;
            justify-content: center;
            margin-bottom: 60px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 180px;
        }

        .btn-primary {
            background-color: #2073ef;
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 20px rgba(32, 115, 239, 0.4);
        }

        .btn-primary:hover {
            background-color: #3b82f6;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        /* Preview Label style */
        .preview-label {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        /* Screenshot Container with Bounce Animation */
        .screenshot-container {
            width: 100%;
            max-width: 650px;
            margin: 0px 0 60px 0;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(32, 115, 239, 0.15);
            animation: bounceSmooth 4s ease-in-out infinite;
        }

        .screenshot-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Continuous Premium Bounce Animation Definition */
        @keyframes bounceSmooth {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        /* Second Section View: Download Box Card */
        .download-card {
            background-color: #0d0e12; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        .card-label {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #6987a3;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 24px;
        }

        .card-meta {
            color: #8da2bb;
            font-size: 1.05rem;
            margin-bottom: 28px;
        }

        .card-meta span {
            display: block;
            margin-top: 4px;
            font-weight: 500;
            color: #2073ef;
            font-size: 0.95rem;
        }

        /* Action Grid inside the card */
        .card-main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #2073ef;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(32, 115, 239, 0.3);
            transition: background-color 0.2s;
        }

        .card-main-btn:hover {
            background-color: #3b82f6;
        }

        .card-sub-grid {
            display: flex;
            gap: 12px;
        }

        .btn-sub {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: rgba(255, 255, 255, 0.04);
            color: #8da2bb;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
        }

        .btn-sub:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Footer */
        footer {
            padding: 30px 20px;
            font-size: 0.85rem;
            color: #537895;
            font-weight: 500;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .cta-group { flex-direction: column; width: 100%; }
            .btn { width: 100%; }
            .card-sub-grid { flex-direction: column; }
        }
    </style>
</head>
