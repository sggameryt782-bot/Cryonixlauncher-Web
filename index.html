<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRYONIXLAUNCHER</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(180deg,#020817,#06142d,#0a1f44,#020817);
color:#fff;
overflow-x:hidden;
}

/* Background Glow */

body::before{
content:"";
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,#2196f355,transparent 70%);
top:-250px;
left:-200px;
filter:blur(50px);
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,#42a5f555,transparent 70%);
bottom:-200px;
right:-150px;
filter:blur(60px);
z-index:-1;
}

/* Header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:sticky;
top:0;
background:rgba(4,18,45,.65);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:100;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:28px;
font-weight:700;
color:white;
}

.logo i{
color:#4fc3ff;
text-shadow:0 0 15px #2196f3;
}

.social a{
color:white;
font-size:22px;
margin-left:18px;
transition:.3s;
}

.social a:hover{
color:#4fc3ff;
transform:translateY(-4px);
}

/* Hero */

.hero{
text-align:center;
padding:120px 20px;
}

.badge{
display:inline-block;
padding:12px 25px;
background:rgba(255,255,255,.08);
border:1px solid #3ea6ff;
border-radius:50px;
backdrop-filter:blur(20px);
margin-bottom:35px;
color:#d7f1ff;
box-shadow:0 0 20px rgba(0,170,255,.2);
}

.hero h1{
font-size:80px;
font-weight:800;
text-shadow:0 0 20px #2196f3;
margin-bottom:15px;
}

.hero p{
font-size:22px;
color:#c8e5ff;
line-height:1.7;
}

/* Buttons */

.buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:50px;
}

.btn{
width:240px;
display:flex;
align-items:center;
gap:15px;
padding:18px 20px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:20px;
text-decoration:none;
color:white;
transition:.35s;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.btn:hover{
transform:translateY(-8px);
border-color:#3ea6ff;
box-shadow:0 0 35px rgba(33,150,243,.6);
}

.btn i{
font-size:32px;
color:#55c2ff;
}

.btn span{
font-size:20px;
font-weight:700;
display:block;
}

.btn small{
display:block;
margin-top:4px;
color:#bddfff;
font-size:14px;
}

.windows{
background:linear-gradient(135deg,#2196f3,#1565c0);
}

.android{
background:linear-gradient(135deg,#1976d2,#0d47a1);
}

.source{
background:linear-gradient(135deg,#0d47a1,#1e88e5);
}

/* Download Card */

.download{
padding:90px 20px;
text-align:center;
}

.download h2{
font-size:50px;
margin-bottom:40px;
}

.card{
max-width:800px;
margin:auto;
padding:40px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(33,150,243,.18);
}

.card p{
font-size:22px;
color:#d6ebff;
margin-bottom:25px;
}

.big-btn{
display:block;
padding:18px;
border-radius:18px;
background:linear-gradient(135deg,#2196f3,#0d47a1);
color:white;
text-decoration:none;
font-size:22px;
font-weight:600;
margin-bottom:25px;
transition:.3s;
}

.big-btn:hover{
transform:scale(1.03);
box-shadow:0 0 30px #2196f3;
}

.bottom{
display:flex;
gap:20px;
}

.small-btn{
flex:1;
padding:16px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
text-decoration:none;
color:white;
transition:.3s;
}

.small-btn:hover{
background:#2196f3;
}

/* Footer */

footer{
text-align:center;
padding:35px;
color:#9ecfff;
}

/* Responsive */

@media(max-width:768px){

.hero h1{
font-size:48px;
}

.hero p{
font-size:18px;
}

.buttons{
flex-direction:column;
align-items:center;
}

.bottom{
flex-direction:column;
}

header{
padding:18px;
}

.logo{
font-size:22px;
}

            }
